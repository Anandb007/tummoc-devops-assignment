name: CI-CD

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: tummoc-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Verify AWS Login
      run: aws sts get-caller-identity

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS \
        --password-stdin 486408064722.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker Image
      run: |
        docker build -t $ECR_REPOSITORY:latest -f docker/Dockerfile .

    - name: Tag Image
      run: |
        docker tag $ECR_REPOSITORY:latest \
        486408064722.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Push Image
      run: |
        docker push \
        486408064722.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:latest
