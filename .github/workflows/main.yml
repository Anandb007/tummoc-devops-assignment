name: CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin 486408064722.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t tummoc-app:v1 -f docker/Dockerfile .

      - name: Tag & Push Docker image
        run: |
          docker tag tummoc-app:v1 486408064722.dkr.ecr.us-east-1.amazonaws.com/tummoc-app:v1
          docker push 486408064722.dkr.ecr.us-east-1.amazonaws.com/tummoc-app:v1

      - name: Terraform Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
