name: CI-CD

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: tummoc-app
  ECR_REGISTRY: 486408064722.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    ################################################
    # 1️⃣ Checkout Repository
    ################################################
    - name: Checkout Repository
      uses: actions/checkout@v3

    ################################################
    # 2️⃣ Setup Python
    ################################################
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    ################################################
    # 3️⃣ Install Dependencies
    ################################################
    - name: Install Dependencies
      run: |
        pip install -r app/requirements.txt

    ################################################
    # 4️⃣ Lint
    ################################################
    - name: Run Linter
      run: |
        flake8 app/

    ################################################
    # 5️⃣ Test
    ################################################
    - name: Run Tests
      run: |
        PYTHONPATH=. pytest

    ################################################
    # 6️⃣ Configure AWS Credentials
    ################################################
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    ################################################
    # 7️⃣ Terraform Infrastructure for App
    ################################################
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform -chdir=terraform init

    - name: Terraform Plan
      run: terraform -chdir=terraform plan

    - name: Terraform Apply
      run: terraform -chdir=terraform apply -auto-approve

    ################################################
    # 8️⃣ Docker Build & Push
    ################################################
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin $ECR_REGISTRY

    - name: Build Docker Image
      run: |
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG -f docker/Dockerfile .

    - name: Tag Docker Image
      run: |
        docker tag $ECR_REPOSITORY:$IMAGE_TAG \
        $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Push Docker Image
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    ################################################
    # 9️⃣ Deploy App to EC2 via SSM
    ################################################
    - name: Deploy to EC2
      run: |
        aws ssm send-command \
        --targets "Key=tag:App,Values=tummoc-app" \
        --document-name "AWS-RunShellScript" \
        --parameters 'commands=["/home/ec2-user/deploy.sh '${IMAGE_TAG}'"]' \
        --region $AWS_REGION

    ################################################
    # 10️⃣ Terraform Monitoring (Prometheus + Grafana)
    ################################################
    - name: Terraform Init for Monitoring
      run: terraform -chdir=terraform/monitoring init

    - name: Terraform Plan for Monitoring
      run: terraform -chdir=terraform/monitoring plan

    - name: Terraform Apply for Monitoring
      run: terraform -chdir=terraform/monitoring apply -auto-approve

    - name: Output Monitoring EC2 IPs
      id: monitoring_ip
      run: |
        MONITORING_IPS=$(terraform -chdir=terraform/monitoring output -json monitoring_ec2_public_ip | jq -r '.[]')
        echo "MONITORING_IP=$MONITORING_IPS" >> $GITHUB_ENV
        echo "Monitoring instance public IP(s): $MONITORING_IPS"

    - name: Show Grafana/Prometheus URLs
      run: |
        for ip in $MONITORING_IP; do
          echo "Grafana URL: http://$ip:3000"
          echo "Prometheus URL: http://$ip:9090"
        done

    ################################################
    # 11️⃣ Output App EC2 IPs (Optional)
    ################################################
    - name: Get App EC2 IPs
      run: |
        APP_IPS=$(terraform -chdir=terraform output -json app_ec2_public_ips | jq -r '.[]')
        echo "APP_IPS=$APP_IPS" >> $GITHUB_ENV
        echo "App EC2 public IP(s): $APP_IPS"
