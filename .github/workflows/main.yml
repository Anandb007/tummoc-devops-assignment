name: CI-CD

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: tummoc-app
  ECR_REGISTRY: 486408064722.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Configure AWS credentials using OIDC
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Verify login
    - name: Verify AWS Identity
      run: aws sts get-caller-identity

    # Generate image tag using commit SHA
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # Login to ECR
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS \
        --password-stdin $ECR_REGISTRY

    # Build Docker image
    - name: Build Docker Image
      run: |
        docker build \
        -t $ECR_REPOSITORY:$IMAGE_TAG \
        -f docker/Dockerfile .

    # Tag Docker image for ECR
    - name: Tag Docker Image
      run: |
        docker tag $ECR_REPOSITORY:$IMAGE_TAG \
        $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Push image to ECR
    - name: Push Docker Image
      run: |
        docker push \
        $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Deploy to EC2 instances in Auto Scaling Group using SSM
    - name: Deploy to EC2 via SSM
      run: |
        aws ssm send-command \
        --targets "Key=tag:App,Values=tummoc-app" \
        --document-name "AWS-RunShellScript" \
        --parameters 'commands=["/home/ec2-user/deploy.sh '${IMAGE_TAG}'"]' \
        --region $AWS_REGION
