name: CI-CD

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: tummoc-app
  ECR_REGISTRY: 486408064722.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    ################################################
    # Checkout Code
    ################################################

    - name: Checkout Repository
      uses: actions/checkout@v3


    ################################################
    # Setup Python for Lint & Test
    ################################################

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r app/requirements.txt


    ################################################
    # Lint
    ################################################

    - name: Run Linter
      run: |
        flake8 app/


    ################################################
    # Test
    ################################################

    - name: Run Tests
      run: |
        pytest


    ################################################
    # Configure AWS Credentials
    ################################################

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Verify AWS Identity
      run: aws sts get-caller-identity


    ################################################
    # Terraform Infrastructure Provisioning
    ################################################

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform -chdir=terraform init

    - name: Terraform Plan
      run: terraform -chdir=terraform plan

    - name: Terraform Apply
      run: terraform -chdir=terraform apply -auto-approve


    ################################################
    # Docker Build
    ################################################

    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV


    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS \
        --password-stdin $ECR_REGISTRY


    - name: Build Docker Image
      run: |
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG -f docker/Dockerfile .


    - name: Tag Docker Image
      run: |
        docker tag $ECR_REPOSITORY:$IMAGE_TAG \
        $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


    - name: Push Docker Image
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


    ################################################
    # Deploy to EC2 via SSM
    ################################################

    - name: Deploy to EC2
      run: |
        aws ssm send-command \
        --targets "Key=tag:App,Values=tummoc-app" \
        --document-name "AWS-RunShellScript" \
        --parameters 'commands=["/home/ec2-user/deploy.sh '${IMAGE_TAG}'"]' \
        --region $AWS_REGION
